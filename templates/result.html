<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edited Image</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container text-center mt-5">
        <h2 class="text-success">✨ Your Image is Ready!</h2>
        <div class="row mt-4">
            <div class="col-md-6">
                <h5 class="text-primary">Original</h5>
                <img src="/uploads/{{ original }}" class="img-fluid rounded shadow-lg border">
            </div>
            <div class="col-md-6">
                <h5 class="text-success">Edited</h5>
                <img src="/edited/{{ edited }}" class="img-fluid rounded shadow-lg border">
            </div>
        </div>
        <a href="/download/{{ edited }}" class="btn btn-primary mt-4">⬇️ Download Edited Image</a>
    </div>
</body>
</html>
