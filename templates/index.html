<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attractive Image Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container text-center mt-5">
        <h1 class="mb-4 text-primary">🌟 Image Editor</h1>
        <p class="text-muted">Upload your photo, preview it, edit, and download in best quality.</p>
        <form method="POST" action="/upload" enctype="multipart/form-data" class="mt-4">
            <input type="file" name="file" accept="image/*" class="form-control mb-3">
            <button type="submit" class="btn btn-success">Upload & Edit</button>
        </form>
    </div>
</body>
</html>
